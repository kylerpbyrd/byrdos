name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Typecheck
        run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: byrdos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/byrdos_test
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm vitest run --coverage --coverage.reporter=json-summary --coverage.reporter=text

      - name: Coverage gate
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const path = './coverage/coverage-summary.json';
            if (!fs.existsSync(path)) {
              console.error('Coverage summary not found');
              process.exit(1);
            }
            const summary = JSON.parse(fs.readFileSync(path, 'utf8'));
            const pct = summary.total?.lines?.pct ?? 0;
            if (pct < 70) {
              console.error('Line coverage ' + pct + '% is below 70% threshold');
              process.exit(1);
            }
            console.log('Line coverage ' + pct + '% meets 70% threshold');
          "

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Build
        run: pnpm build
